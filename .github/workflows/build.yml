name: "build-check"

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  check-rust:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system deps (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev patchelf \
            libgtk-3-dev pkg-config libasound2-dev libpulse-dev \
            libayatana-appindicator3-dev

      - name: Create env file
        run: |
          echo "API_ACCESS_KEY=dummy" > src-tauri/.env
          echo "PAYMENT_ENDPOINT=http://localhost" >> src-tauri/.env
          echo "APP_ENDPOINT=http://localhost" >> src-tauri/.env
          echo "POSTHOG_API_KEY=dummy" >> src-tauri/.env

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
